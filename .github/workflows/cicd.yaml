name: CI Pipeline
on:
  push:
    branches:
      - main
jobs:

    Trivy:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Run Trivy scan
          uses: aquasecurity/trivy-action@master
          with:
            scan-type: 'fs'
            format: 'table'
            exit-code: '1'
            severity: 'CRITICAL,HIGH'
    gitleaks:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Run Gitleaks scan
          uses: zricethezav/gitleaks-action@v1.3.0
          with:
            args: "--path=. --verbose"
    SonarQube:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Set up SonarQube
          uses: sonarsource/sonarqube-scan-action@v5
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          with:
            args: >
              -Dsonar.projectKey=Demo-Challenge
              -Dsonar.host.url=http://18.204.228.177:9000/
    unit-tests:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Set up Node.js
          uses: actions/setup-node@v3
          with:
            node-version: '16'
        - name: Install dependencies
          run: npm install
        - name: Run unit tests
          run: npm test
          
    docker-build:
        runs-on: ubuntu-latest
        needs: [Trivy, gitleaks, SonarQube, unit-tests]
        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Build Docker image
          run: docker build -t node-image:v1 .
        - name: Tag Docker image with Git SHA
          run: docker tag node-image:v1 ${{ vars.DOCKER_USERNAME }}/node-image:${{ github.sha }}
        - name: Log in to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ vars.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        - name: Push Docker image
          run: docker push ${{ vars.DOCKER_USERNAME }}/node-image:${{ github.sha }}