
apiVersion: apps/v1
kind: Deployment

metadata:
  name: demo-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: demo-app

  template:
    metadata:
      labels:
        app: demo-app

    spec:

      # imagePullSecrets:
      # - name: ecr-secret
      initContainers:
      - name: init-container
        image: busybox:1.35.0
        command:
          - sh
          - -c
          - |
            echo "Waiting for Postgres to be ready..."
            until nc -z postgres 5432; do
              echo "Postgres is not ready yet. Retrying in 5 seconds..."
              sleep 5
            done
            echo "Postgres is ready. Proceeding with the application startup."  

      containers:
      - name: demo-app
        image: nani4027/node-image:7d76b94ae97676f5913d898c8a8b6af5b2b5b6ee
        imagePullPolicy: Always

        env:
        - name: DB_HOST
          value: postgres

        ports:
        - containerPort: 3000

        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 25
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health/live
            port: 3000
          initialDelaySeconds: 25
          periodSeconds: 10

---
apiVersion: v1
kind: Service

metadata:
  name: demo-app-service

spec:
  selector:
    app: demo-app

  ports:
  - port: 80
    targetPort: 3000

  type: NodePort

